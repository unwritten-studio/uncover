<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uncover — Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              blue:  '#3987b8',
              black: '#3e4447',
              grey:  '#f4f5f5',
            }
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-white text-brand-black h-screen flex flex-col overflow-hidden">

  <!-- ── Top bar ────────────────────────────────────────────────────── -->
  <header class="bg-brand-black text-white px-6 py-3 flex items-center justify-between flex-shrink-0">
    <div class="flex items-center gap-3">
      <h1 class="text-base font-light tracking-widest uppercase">Uncover</h1>
      <span class="opacity-30">·</span>
      <span class="text-sm opacity-50" id="book-stats">Lade Kapitel…</span>
    </div>
    <div class="flex items-center gap-3">
      <button id="token-btn" class="text-xs opacity-50 hover:opacity-90 transition-opacity px-2 py-1 rounded hover:bg-white/10">
        ⚙ Token
      </button>
      <button id="save-btn"
        class="hidden bg-brand-blue text-white text-sm px-4 py-1.5 rounded hover:bg-blue-600 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
        Speichern
      </button>
    </div>
  </header>

  <!-- ── Main layout ────────────────────────────────────────────────── -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-brand-grey border-r border-gray-200 flex flex-col overflow-hidden flex-shrink-0">
      <div class="px-4 py-3 border-b border-gray-200">
        <p class="text-xs uppercase tracking-wider text-gray-400 font-medium">Kapitel</p>
      </div>
      <div class="flex-1 overflow-y-auto" id="chapter-list">
        <div class="p-4 text-sm text-gray-400">Laden…</div>
      </div>
      <div class="px-4 py-3 border-t border-gray-200 text-xs text-gray-400 leading-relaxed" id="sidebar-stats"></div>
    </aside>

    <!-- Content area -->
    <div class="flex-1 flex flex-col overflow-hidden min-w-0">

      <!-- Chapter header bar (hidden until chapter opened) -->
      <div id="editor-header"
        class="hidden bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between flex-shrink-0">
        <h2 class="font-normal text-brand-black truncate mr-4" id="chapter-title">—</h2>
        <div class="flex items-center gap-3 flex-shrink-0">
          <span class="text-xs text-gray-400 whitespace-nowrap" id="chapter-stats"></span>
          <div class="flex rounded overflow-hidden border border-gray-200">
            <button id="view-editor"  class="view-btn active text-xs px-3 py-1.5">Bearbeiten</button>
            <button id="view-split"   class="view-btn text-xs px-3 py-1.5 border-l border-gray-200">Geteilt</button>
            <button id="view-preview" class="view-btn text-xs px-3 py-1.5 border-l border-gray-200">Vorschau</button>
          </div>
        </div>
      </div>

      <!-- Welcome screen -->
      <div id="welcome-screen" class="flex-1 flex items-center justify-center text-gray-300">
        <div class="text-center select-none">
          <div class="text-6xl mb-4">◻</div>
          <p class="text-lg font-light">Kapitel aus der Liste wählen</p>
        </div>
      </div>

      <!-- Editor + Preview -->
      <div id="editor-area" class="hidden flex-1 flex overflow-hidden min-h-0">
        <div id="editor-pane" class="flex-1 overflow-hidden min-w-0">
          <textarea id="editor-textarea"></textarea>
        </div>
        <div id="preview-pane" class="hidden flex-1 overflow-y-auto border-l border-gray-200 min-w-0">
          <div id="preview-content" class="book-prose px-12 py-10 max-w-2xl mx-auto"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Token modal ────────────────────────────────────────────────── -->
  <div id="token-modal"
    class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white rounded-lg p-6 w-full max-w-sm shadow-2xl">
      <h3 class="font-medium mb-1">GitHub Access Token</h3>
      <p class="text-sm text-gray-500 mb-4">
        Zum Speichern von Änderungen wird ein Personal Access Token mit
        <code class="bg-gray-100 px-1 rounded text-xs">repo</code>-Berechtigung benötigt.<br>
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=Uncover+Dashboard"
          target="_blank" class="text-brand-blue hover:underline text-sm">Token bei GitHub erstellen →</a>
      </p>
      <input type="password" id="token-input" placeholder="ghp_…"
        class="w-full border border-gray-200 rounded px-3 py-2 text-sm mb-4 font-mono focus:outline-none focus:ring-2 focus:ring-brand-blue/30">
      <div class="flex justify-between items-center">
        <button id="token-clear" class="text-xs text-red-400 hover:text-red-600">Token löschen</button>
        <div class="flex gap-2">
          <button id="token-cancel" class="text-sm text-gray-500 px-4 py-2 hover:text-gray-700">Abbrechen</button>
          <button id="token-save"
            class="text-sm bg-brand-blue text-white px-4 py-2 rounded hover:bg-blue-600 transition-colors">
            Speichern
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Scripts ────────────────────────────────────────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
